name: Deploy to VPS

# Self-hosted runner deploy: the runner lives ON the VPS (registered as the
# `deploy` user, same as the arzonic/ranky runners), so it builds locally and
# reloads PM2 directly — no SSH keys or deploy secrets needed.
#
# The job operates on the live deploy directory /opt/agent-engine (where PM2
# runs from), NOT the runner's _work checkout — so PM2 always serves the same
# path. DEPLOY_PATH can be overridden with a repo variable (Settings → Secrets
# and variables → Actions → Variables) if the path ever changes.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    # Matches the labels you give the runner at registration time.
    runs-on: [self-hosted, agent-engine]
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/agent-engine' }}
    steps:
      - name: Pull, build and reload
        run: |
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch --all
          git reset --hard origin/main
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
          pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
          pm2 save
